<!DOCTYPE html>
</html>

<style>
    body {
        transform: scale(1);
        margin-left: 20px;
        font-family: georgia;
    }

    h1 {
        font-size: 40px;
    }

    .page-links {
        font-size: 1rem;
    }

    div {
        font-size: 20px;
        padding-top: 5px;
        padding-bottom: 5px;
    }

    table,
    th,
    td {
        border: 1px solid black;
        border-collapse: collapse;
    }

    th,
    td {
        padding: 5px;
        text-align: left;
    }

    th {
        cursor: pointer;
    }

    @media (max-width: 520px) {
        body {
            margin: 0;
            padding: 6px;
        }

        h1 {
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .page-links {
            font-size: 1rem;
        }

        table {
            table-layout: fixed;
            width: 100%;
            font-size: 11px;
        }

        th,
        td {
            padding: 2px;
            overflow-wrap: anywhere;
        }

        th:nth-child(1),
        td:nth-child(1) {
            width: 7%;
        }

        th:nth-child(2),
        td:nth-child(2) {
            width: 34%;
        }

        th:nth-child(3),
        td:nth-child(3) {
            width: 14%;
        }

        th:nth-child(4),
        td:nth-child(4) {
            width: 24%;
        }

        th:nth-child(5),
        td:nth-child(5) {
            width: 13%;
        }

        th:nth-child(6),
        td:nth-child(6) {
            width: 8%;
        }
    }
</style>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Piece List</title>
</head>

<body>
    <header>
        <h1>Piece List</h1>
    </header>
    <div class="page-links">
        <a href="index.html">Go to Music Player</a> &nbsp; &nbsp;
        <a href="albums.html">Go to Album List</a>
    </div>
    <br>
    <p id="list">
    <table class="sortable" id="songs">
        <tr>
            <th>#</th>
            <th>Piece</th>
            <th>Key</th>
            <th>Composer</th>
            <th>Length</th>
            <th>Tier</th>
        </tr>
    </table>
    </p>
    <script type="text/javascript" src="data.js"></script>
    <script type="text/javascript" src="ref.js"></script>
    <script type="text/javascript" src="sorttable.js"></script>
</body>

</html>
